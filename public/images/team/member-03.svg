<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdbcb4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a085;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg)"/>

  <!-- Face -->
  <circle cx="150" cy="140" r="60" fill="url(#face)"/>

  <!-- Eyes -->
  <circle cx="135" cy="125" r="8" fill="#1a1a2e"/>
  <circle cx="165" cy="125" r="8" fill="#1a1a2e"/>
  <circle cx="137" cy="123" r="3" fill="#ffffff"/>
  <circle cx="167" cy="123" r="3" fill="#ffffff"/>

  <!-- Nose -->
  <ellipse cx="150" cy="140" rx="2" ry="4" fill="#e8a085"/>

  <!-- Mouth -->
  <path d="M 140 155 Q 150 170 160 155" stroke="#c41e3a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Hair -->
  <path d="M 110 110 Q 150 80 190 110 Q 180 95 150 90 Q 120 95 110 110" fill="#1a1a2e"/>

  <!-- Body/Shirt -->
  <rect x="100" y="200" width="100" height="80" rx="15" fill="#1a1a2e"/>
  <rect x="120" y="220" width="60" height="40" rx="8" fill="#ffffff"/>
  <circle cx="135" cy="235" r="3" fill="#c41e3a"/>
  <circle cx="165" cy="235" r="3" fill="#c41e3a"/>

  <!-- LEO Badge -->
  <rect x="130" y="270" width="40" height="15" rx="7" fill="#ffc107"/>
  <text x="150" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a1a2e">LEO</text>
</svg>